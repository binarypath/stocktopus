{{template "layout" .}}
{{define "content"}}
<div class="page-header">
    <h1>Watchlist</h1>
    <form id="add-security-form" class="add-security-form">
        <input type="text" id="wl-security-input" placeholder="Add security (e.g. AAPL)" autocomplete="off" spellcheck="false">
        <button type="submit">+</button>
    </form>
</div>
<div id="watchlist-tabs" class="watchlist-tabs"></div>
<div class="watchlist">
    <table class="quote-table">
        <thead>
            <tr>
                <th>Security</th>
                <th>Price</th>
                <th>Change</th>
                <th>Change %</th>
                <th>Volume</th>
                <th>Updated</th>
            </tr>
        </thead>
        <tbody id="quote-body">
        </tbody>
    </table>
    <p id="empty-state" class="empty-state">Add securities to start tracking</p>
</div>
{{end}}
