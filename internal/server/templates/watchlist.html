{{template "layout" .}}
{{define "content"}}
<div class="page-header">
    <h1>Watchlist</h1>
    <form id="add-security-form" class="add-security-form">
        <input type="text" id="wl-security-input" placeholder="Add security (search ticker or company name)" autocomplete="off" spellcheck="false">
        <button type="submit">+</button>
        <div id="wl-security-dropdown" class="security-dropdown hidden"></div>
    </form>
</div>
<div id="watchlist-tabs" class="watchlist-tabs"></div>
<div class="watchlist">
    <table class="quote-table">
        <thead>
            <tr>
                <th>Security</th>
                <th>Price :live:</th>
                <th>Change 1d</th>
                <th>Change % 1d</th>
                <th>Change 1w</th>
                <th>Change % 1w</th>
                <th>Change 6m</th>
                <th>Volume</th>
                <th>6m</th>
            </tr>
        </thead>
        <tbody id="quote-body">
        </tbody>
    </table>
    <p id="empty-state" class="empty-state">Add securities to start tracking</p>
</div>
{{end}}
