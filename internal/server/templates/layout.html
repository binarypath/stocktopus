{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stocktopus — {{.Title}}</title>
    <script src="/static/htmx.min.js"></script>
    <script src="/static/htmx-ws.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Stocktopus</div>
        <div class="nav-links">
            <a href="/watchlist" class="nav-link{{if eq .Active "watchlist"}} active{{end}}">Watchlist</a>
            <a href="/screener" class="nav-link{{if eq .Active "screener"}} active{{end}}">Screener</a>
            <a href="/feed" class="nav-link{{if eq .Active "feed"}} active{{end}}">Feed</a>
            <a href="/debug" class="nav-link{{if eq .Active "debug"}} active{{end}}">Debug</a>
        </div>
        <div class="nav-status" id="conn-status">Disconnected</div>
    </nav>
    <main class="content">
        {{template "content" .}}
    </main>
</body>
</html>{{end}}
